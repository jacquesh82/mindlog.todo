# Production stack for str01. Runs PREBUILT images pulled from GHCR (built and
# pushed by .github/workflows/deploy.yml) — no build toolchain needed on the
# server. The web edge speaks plain HTTP behind str01's existing TLS reverse
# proxy. Used standalone (NOT layered on docker-compose.yml):
#   IMAGE_TAG=<tag> docker compose -f docker-compose.prod.yml up -d
#
# Required on the server: a `.env` file (see .env.prod.example) holding secrets.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mindlog}
    # No host port published — the db is only reachable inside the compose network.
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindlog} -d ${POSTGRES_DB:-mindlog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${REGISTRY:-ghcr.io/jacquesh82/mindlog.todo}/api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mindlog}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mindlog}
      PORT: 8080
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: ${REGISTRY:-ghcr.io/jacquesh82/mindlog.todo}/web:${IMAGE_TAG:-latest}
    # This container terminates TLS itself and binds a loopback HTTPS port; the
    # host's SNI-passthrough edge routes todo.mindlog.today here by hostname.
    # Set WEB_HTTPS_BIND=0.0.0.0 if the edge lives on another host/network.
    ports:
      - "${WEB_HTTPS_BIND:-127.0.0.1}:${WEB_HTTPS_PORT:-9743}:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt cert for the TLS_DOMAIN, read-only (jot.mindlog.today pattern).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
