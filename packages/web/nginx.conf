# Edge for mindlog.todo: terminates TLS, serves the SPA, and reverse-proxies the
# API/MCP/docs to the `api` service — so the whole app lives on one HTTPS origin
# (https://todo.mindlog.localhost).

# Redirect all plain HTTP to HTTPS.
server {
  listen 80;
  server_name todo.mindlog.localhost localhost _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name todo.mindlog.localhost localhost _;

  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Resolve the `api` service name lazily via Docker DNS so nginx still starts
  # even if `api` is briefly unavailable.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream http://api:8080;

  # Allow large bodies so note pages can carry pasted (base64) images.
  client_max_body_size 16m;

  # Common proxy headers (inherited by the proxied locations below).
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ {
    proxy_pass $api_upstream;
  }

  location = /health {
    proxy_pass $api_upstream;
  }

  location /docs {
    proxy_pass $api_upstream;
  }

  location = /openapi.json {
    proxy_pass $api_upstream;
  }

  # MCP Streamable HTTP — disable buffering so SSE responses stream through.
  location /mcp {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA fallback for client-side routes (e.g. /auth/callback).
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
