# DEV edge for mindlog.todo. Same TLS + /api reverse-proxy as nginx.conf, but the
# SPA is NOT served from a built dist/ — instead everything is proxied to the Vite
# dev server (`webdev` service) so you get Hot Module Replacement. Mounted over
# /etc/nginx/conf.d/default.conf by docker-compose.override.yml (dev only).
#
# The shared gateway still reaches this container at https://web:443, so the
# public URL (https://todo.mindlog.localhost/app/) and routing stay unchanged.

# Map the Upgrade header so WebSocket (Vite HMR) connections are proxied correctly.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Redirect plain HTTP to HTTPS.
server {
  listen 80;
  server_name todo.mindlog.localhost localhost _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name todo.mindlog.localhost localhost _;

  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Lazy Docker DNS resolution so nginx starts even if upstreams are briefly down.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream http://api:8080;
  set $web_dev      http://webdev:5173;

  client_max_body_size 16m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ { proxy_pass $api_upstream; }
  location = /health { proxy_pass $api_upstream; }
  location /docs { proxy_pass $api_upstream; }
  location = /openapi.json { proxy_pass $api_upstream; }

  # MCP Streamable HTTP — disable buffering so SSE responses stream through.
  location /mcp {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # OAuth 2.1 authorization server + discovery → API (the consent page /authorize
  # is a client-side route served by the Vite dev server below).
  location /oauth/ { proxy_pass $api_upstream; }
  location /.well-known/oauth-authorization-server { proxy_pass $api_upstream; }
  location /.well-known/oauth-protected-resource { proxy_pass $api_upstream; }
  location = /.well-known/openid-configuration { proxy_pass $api_upstream; }

  # Everything else → Vite dev server (HMR over WebSocket).
  location / {
    proxy_pass $web_dev;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
