# Dev HTTP edge for mindlog.todo.
# TLS is terminated by the shared Caddy dev proxy (mindlog.id/Caddyfile.dev).
# This nginx speaks plain HTTP on port 80 — Caddy proxies
# https://todo.mindlog.localhost to here on host port 8081.
server {
  listen 80;
  server_name todo.mindlog.localhost localhost _;

  client_max_body_size 16m;

  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream http://api:8080;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  # Forward the HTTPS proto set by Caddy so the API emits Secure cookies.
  proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

  location /api/ {
    proxy_pass $api_upstream;
  }

  location = /health {
    proxy_pass $api_upstream;
  }

  location /docs {
    proxy_pass $api_upstream;
  }

  location = /openapi.json {
    proxy_pass $api_upstream;
  }

  location /mcp {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
