# Production edge for mindlog.todo when running BEHIND an existing reverse proxy
# (Traefik / nginx / Caddy) that terminates TLS. This container therefore speaks
# plain HTTP on :80 — the upstream proxy handles certificates and HTTPS.
#
# It serves the SPA and reverse-proxies /api, /mcp, /docs to the `api` service,
# keeping everything same-origin. Mounted over the image default via compose:
#   volumes: ./packages/web/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

server {
  listen 80;
  server_name _;

  # Resolve the `api` service name lazily via Docker DNS so nginx still starts
  # even if `api` is briefly unavailable.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream http://api:8080;

  # Allow large bodies so note pages can carry pasted (base64) images.
  client_max_body_size 16m;

  # Common proxy headers. X-Forwarded-Proto is forwarded from the outer proxy so
  # the app sees the original https scheme.
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

  location /api/ {
    proxy_pass $api_upstream;
  }

  location = /health {
    proxy_pass $api_upstream;
  }

  location /docs {
    proxy_pass $api_upstream;
  }

  location = /openapi.json {
    proxy_pass $api_upstream;
  }

  # MCP Streamable HTTP — disable buffering so SSE responses stream through.
  location /mcp {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA fallback for client-side routes (e.g. /auth/callback).
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
