# Production config for the mindlog.todo web container. On str01 it runs HTTP-only
# behind the Astro front (mindlog.todo.web), which terminates TLS for
# todo.mindlog.today and proxies the `/app` sub-path here (stripping the prefix).
# So this nginx is path-agnostic at the root; the SPA bundle is what's rebased to
# `/app` (Vite base + VITE_API_URL), and the front re-adds/strips the prefix.

server {
  listen 80;
  server_name _;

  # Resolve the `api` service name lazily via Docker DNS so nginx still starts
  # even if `api` is briefly unavailable.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream http://api:8080;

  # Allow large bodies so note pages can carry pasted (base64) images.
  client_max_body_size 16m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

  location /api/ {
    proxy_pass $api_upstream;
  }

  location = /health {
    proxy_pass $api_upstream;
  }

  location /docs {
    proxy_pass $api_upstream;
  }

  location = /openapi.json {
    proxy_pass $api_upstream;
  }

  # MCP Streamable HTTP — disable buffering so SSE responses stream through.
  location /mcp {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA fallback for client-side routes (e.g. /auth/callback). The bundle's asset
  # URLs are /app/... but the physical files live at the docroot, and the front
  # strips /app before proxying, so serving at root resolves them correctly.
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
