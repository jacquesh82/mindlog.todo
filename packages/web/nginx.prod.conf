# Production edge for mindlog.todo on a host whose front proxy is an L4
# SNI-passthrough demux (nginx stream + ssl_preread): the outer edge does NOT
# terminate TLS — it routes by SNI to a loopback port where THIS container
# terminates TLS itself (mirroring the sibling jot.mindlog.today setup).
#
# The Let's Encrypt cert is mounted read-only at /etc/letsencrypt (see
# docker-compose.prod.yml). This serves the SPA and reverse-proxies the API,
# keeping everything same-origin under https://todo.mindlog.today.

server {
  listen 443 ssl;
  http2 on;
  server_name todo.mindlog.today _;

  ssl_certificate     /etc/letsencrypt/live/todo.mindlog.today/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/todo.mindlog.today/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Resolve the `api` service name lazily via Docker DNS so nginx still starts
  # even if `api` is briefly unavailable.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream http://api:8080;

  # Allow large bodies so note pages can carry pasted (base64) images.
  client_max_body_size 16m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;

  location /api/ {
    proxy_pass $api_upstream;
  }

  location = /health {
    proxy_pass $api_upstream;
  }

  location /docs {
    proxy_pass $api_upstream;
  }

  location = /openapi.json {
    proxy_pass $api_upstream;
  }

  # MCP Streamable HTTP — disable buffering so SSE responses stream through.
  location /mcp {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA fallback for client-side routes (e.g. /auth/callback).
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
